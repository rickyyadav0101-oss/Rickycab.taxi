<!DOCTYPE html>
<html>
<head>
  <title>Ricky Cab Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial; padding:20px; background:#f2f2f2; }
    .box { background:white; padding:20px; border-radius:10px; }
    input, button { width:100%; padding:10px; margin-top:10px; }
    button { background:black; color:white; }
  </style>
</head>

<body>

<div class="box">
  <h2>🚖 Book Scorpio</h2>

  <form onsubmit="sendWhatsApp(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="pickup" placeholder="Pickup Location" required>
    <input type="text" id="drop" placeholder="Drop Location" required>
    <input type="number" id="km" placeholder="Distance (KM)" required>

    <button type="submit">Book Now</button>
  </form>
</div>

<script>
function sendWhatsApp(e){
  e.preventDefault();

  let name = document.getElementById('name').value;
  let pickup = document.getElementById('pickup').value;
  let drop = document.getElementById('drop').value;
  let km = document.getElementById('km').value;

  let price = km * 44;

  let msg = `🚖 New Booking
Name: ${name}
Pickup: ${pickup}
Drop: ${drop}
KM: ${km}
Fare: ₹${price}`;

  let phone = "9113191305";

  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
